<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GAICANI – პირადი ჩატი</title>
  <meta name="theme-color" content="#1e1f22" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1f22;
      --surface:   #2b2d31;
      --border:    rgba(255,255,255,0.07);
      --accent:    #5865f2;
      --accent-lt: #7c84f8;
      --text:      #dcddde;
      --muted:     #72767d;
      --bubble-me: #5865f2;
      --bubble-me-text: #fff;
      --bubble-them: #2b2d31;
      --bubble-them-text: #dcddde;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%; height: 100dvh;
    }

    /* ── HEADER ── */
    .fc-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      box-shadow: 0 1px 8px rgba(0,0,0,0.25);
    }

    .fc-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: none;
      color: var(--text);
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      text-decoration: none;
    }
    .fc-back:hover { background: rgba(255,255,255,0.12); }

    .fc-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; font-weight: 700; color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .fc-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .fc-info {
      flex: 1;
      min-width: 0;
    }
    .fc-name {
      font-size: 0.97em;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fc-sub {
      font-size: 0.72em;
      color: var(--muted);
      margin-top: 1px;
    }

    .fc-expiry-badge {
      font-size: 0.68em;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 9px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── MESSAGES AREA ── */
    #fc-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* Date separator — hidden */
    .fc-date-sep { display: none; }

    /* Message row */
    .fc-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      width: 100%;
      justify-content: flex-start;
      box-sizing: border-box;
    }
    .fc-row.me {
      justify-content: flex-end;
    }

    .fc-row-avatar, .fc-row-spacer { display: none; }

    .fc-bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: min(72%, 480px);
      gap: 2px;
    }
    .fc-row.me .fc-bubble-wrap {
      align-items: flex-end;
    }

    .fc-bubble {
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 0.9em;
      line-height: 1.48;
      word-break: break-word;
      white-space: pre-wrap;
      position: relative;
    }
    /* Them bubble */
    .fc-row:not(.me) .fc-bubble {
      background: var(--bubble-them);
      color: var(--bubble-them-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    /* Me bubble */
    .fc-row.me .fc-bubble {
      background: var(--bubble-me);
      color: var(--bubble-me-text);
      border-bottom-right-radius: 4px;
      box-shadow: 0 1px 6px rgba(88,101,242,0.3);
    }

    /* Consecutive bubble rounding */
    .fc-row.consec:not(.me) .fc-bubble { border-top-left-radius: 4px; }
    .fc-row.consec.me .fc-bubble { border-top-right-radius: 4px; }

    .fc-meta {
      font-size: 0.66em;
      color: var(--muted);
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .fc-row.me .fc-meta { justify-content: flex-end; }

    .fc-expiry-hint {
      font-size: 0.6em;
      color: #faa61a;
      opacity: 0.7;
    }

    /* ── TYPING INDICATOR ── */
    #fc-typing {
      min-height: 24px;
      padding: 0 12px 4px;
      font-size: 0.76em;
      color: var(--muted);
      display: none;
      align-items: center;
      gap: 6px;
    }
    #fc-typing.visible { display: flex; }

    .typing-dots {
      display: flex;
      gap: 3px;
    }
    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--muted);
      border-radius: 50%;
      animation: tdot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── INPUT BAR ── */
    #fc-input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #fc-input {
      flex: 1;
      min-height: 40px;
      max-height: 120px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 0.9em;
      color: var(--text);
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s;
      overflow-y: hidden;
    }
    #fc-input::placeholder { color: var(--muted); }
    #fc-input:focus { border-color: rgba(88,101,242,0.5); }

    #fc-send {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.1em;
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
    }
    #fc-send:hover { background: #4752c4; }
    #fc-send:active { transform: scale(0.93); }
    #fc-send:disabled { opacity: 0.4; cursor: default; }

    /* ── EMPTY STATE ── */
    #fc-empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9em;
      text-align: center;
      padding: 24px;
    }
    #fc-empty .fc-empty-icon { font-size: 2.8em; margin-bottom: 4px; }
    #fc-empty.visible { display: flex; }

    /* ── LOADING ── */
    #fc-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      color: var(--muted);
      font-size: 0.88em;
    }
    .fc-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(88,101,242,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #fc-loading.hidden { display: none; }

    /* ── AUTH REQUIRED ── */
    #fc-auth-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    #fc-auth-screen.visible { display: flex; }
    #fc-auth-screen a {
      color: var(--accent-lt);
      font-weight: 700;
      text-decoration: none;
    }

    /* ── TOAST ── */
    #fc-toast {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid rgba(88,101,242,0.4);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 0.85em;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      max-width: min(90vw, 340px);
      text-align: center;
    }
    #fc-toast.show { opacity: 1; }

    /* ── Scrollbar ── */
    #fc-messages::-webkit-scrollbar { width: 4px; }
    #fc-messages::-webkit-scrollbar-track { background: transparent; }
    #fc-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── Extra input bar buttons (photo/gif/game) ── */
    .fc-extra-btn {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em;
      color: var(--text);
      transition: background 0.15s, transform 0.1s;
      align-self: flex-end;
      -webkit-tap-highlight-color: transparent;
    }
    .fc-extra-btn:hover  { background: rgba(255,255,255,0.15); }
    .fc-extra-btn:active { transform: scale(0.9); }
    #fc-photo-input { display: none; }

    /* ── Photo messages ── */
    .fc-photo-img {
      max-width: 220px;
      max-height: 220px;
      border-radius: 12px;
      display: block;
      cursor: pointer;
      object-fit: cover;
    }

    /* ── GIF messages ── */
    .fc-gif-img {
      max-width: 220px;
      border-radius: 12px;
      display: block;
    }

    /* ── GIF Picker ── */
    #fc-gif-picker {
      position: fixed;
      bottom: -100%;
      left: 0; right: 0;
      background: #1a1b1e;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px 18px 0 0;
      padding: 12px;
      z-index: 200;
      transition: bottom 0.25s cubic-bezier(.4,0,.2,1);
      max-height: 55vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #fc-gif-picker.open { bottom: 0; }
    #fc-gif-search {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.88em;
      outline: none;
      width: 100%;
    }
    #fc-gif-search::placeholder { color: var(--muted); }
    #fc-gif-results {
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .fc-gif-item {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .fc-gif-item:hover { opacity: 0.8; }

    /* ── Game overlay ── */
    #fc-game-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--safe-bottom);
    }
    #fc-game-overlay.open { display: flex; }

    .fc-game-window {
      background: linear-gradient(160deg, #2b2d31 0%, #23252a 100%);
      border-radius: 22px 22px 0 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      padding: 0;
      width: 100%;
      max-width: 420px;
      max-height: 85dvh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
      animation: gameSheetUp 0.28s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes gameSheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @media (min-width: 500px) {
      #fc-game-overlay { align-items: center; padding: 20px; }
      .fc-game-window  { border-radius: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); max-height: 90dvh; animation: gameFadeIn 0.2s ease both; }
      @keyframes gameFadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    }

    .fc-game-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px 0;
      position: relative;
    }
    .fc-game-header::before {
      content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%);
      width:32px; height:4px; background:rgba(255,255,255,0.14); border-radius:2px;
    }
    @media (min-width:500px) { .fc-game-header::before { display:none; } }

    .fc-game-title { font-weight: 800; font-size: 1.05em; color: #fff; letter-spacing:-0.01em; }
    .fc-game-close-btn {
      background: rgba(255,255,255,0.08); border: none; color: var(--muted);
      font-size: 0.85em; cursor: pointer; padding: 0;
      width:30px; height:30px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition: background 0.15s, color 0.15s;
    }
    .fc-game-close-btn:hover { background:rgba(255,255,255,0.16); color:#fff; }

    .fc-game-menu-list {
      display: flex; flex-direction: column; gap: 8px;
      padding: 14px 18px 20px;
    }
    .fc-game-menu-item {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .fc-game-menu-item:hover  { background: rgba(88,101,242,0.12); border-color: rgba(88,101,242,0.3); }
    .fc-game-menu-item:active { transform: scale(0.98); }
    .fc-game-menu-icon { font-size: 1.8em; }
    .fc-game-menu-info strong { display: block; font-size: 0.92em; color: #fff; font-weight: 700; }
    .fc-game-menu-info small  { font-size: 0.74em; color: var(--muted); margin-top: 2px; display:block; }

    /* game content area */
    #fc-game-content { padding: 14px 18px 20px; min-height: 140px; }
    .fc-game-status {
      text-align: center; color: var(--muted); font-size: 0.85em;
      padding: 10px 0; font-weight: 500;
    }

    /* TTT */
    .fc-ttt-board {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin: 10px 0;
    }
    .fc-ttt-cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 2em; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .fc-ttt-cell:hover:not(:disabled) { background: rgba(88,101,242,0.18); transform: scale(0.97); }
    .fc-ttt-cell:disabled:not(:empty) { opacity: 1; }
    .fc-ttt-cell.win {
      background: rgba(88,101,242,0.28);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(88,101,242,0.3);
    }

    /* RPS */
    .fc-rps-choices { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; padding: 8px 0; }
    .fc-rps-btn {
      font-size: 2em; padding: 14px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      display: flex; flex-direction: column; align-items: center;
    }
    .fc-rps-btn:hover  { background: rgba(88,101,242,0.18); }
    .fc-rps-btn:active { transform: scale(0.92); }
    .fc-rps-btn:disabled { opacity: 0.45; }

    /* Math */
    .fc-math-q {
      text-align: center; font-size: 1.8em; font-weight: 800; color: #fff;
      padding: 14px 0 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .fc-math-input-row { display: flex; gap: 8px; }
    .fc-math-input {
      flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 10px 16px; color: var(--text);
      font-size: 1.1em; outline: none;
      transition: border-color 0.15s;
    }
    .fc-math-input:focus { border-color: rgba(88,101,242,0.6); }
    .fc-math-submit {
      background: var(--accent); border: none; border-radius: 12px;
      padding: 10px 20px; color: #fff; font-size: 1em; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .fc-math-submit:hover  { background: var(--accent-lt); }
    .fc-math-submit:active { transform: scale(0.94); }

    /* Game result */
    #fc-game-result { text-align: center; display: none; padding: 10px 18px 22px; }
    .fc-game-result-emoji { font-size: 3em; margin-bottom: 6px; }
    .fc-game-result-text { font-size: 1.1em; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .fc-game-result-btns { display: flex; gap: 10px; justify-content: center; }
    .fc-game-result-btn {
      padding: 10px 22px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 0.9em; font-weight: 700;
      transition: opacity 0.15s, transform 0.1s;
    }
    .fc-game-result-btn:active { transform: scale(0.95); }
    .fc-game-result-btn.primary   { background: var(--accent); color: #fff; }
    .fc-game-result-btn.secondary { background: rgba(255,255,255,0.09); color: var(--text); }

    /* ── Game invite bar ── */
    #fc-game-invite-bar {
      display: none;
      padding: 12px 16px;
      background: rgba(88,101,242,0.12);
      border-top: 1px solid rgba(88,101,242,0.3);
      align-items: center; justify-content: space-between; gap: 10px;
      font-size: 0.87em; color: var(--text); font-weight: 500;
    }
    #fc-game-invite-bar.visible { display: flex; animation: slideDown 0.2s ease both; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .fc-invite-btns { display: flex; gap: 8px; }
    .fc-invite-btn {
      padding: 7px 16px; border-radius: 10px; border: none;
      cursor: pointer; font-size: 0.85em; font-weight: 700;
      transition: opacity 0.15s, transform 0.1s;
    }
    .fc-invite-btn:active { transform: scale(0.95); }
    .fc-invite-btn.accept  { background: #3ba55d; color: #fff; }
    .fc-invite-btn.decline { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Reply preview bar (above input) ── */
    #fc-reply-preview {
      display: none;
      flex-shrink: 0;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(88,101,242,0.08);
      border-top: 1px solid var(--border);
    }
    #fc-reply-preview.visible { display: flex; }
    .fc-reply-preview-inner { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .fc-reply-preview-label { color: var(--accent-lt); font-size: 1em; flex-shrink: 0; }
    .fc-reply-preview-body { display: flex; flex-direction: column; min-width: 0; }
    #fc-reply-preview-name { font-size: 0.78em; font-weight: 700; color: var(--accent-lt); }
    #fc-reply-preview-text {
      font-size: 0.78em; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    #fc-reply-preview-close {
      background: none; border: none; color: var(--muted);
      font-size: 0.95em; cursor: pointer; padding: 4px 6px; flex-shrink: 0;
    }
    #fc-reply-preview-close:hover { color: #fff; }

    /* ── Char counter ── */
    .fc-char-count {
      font-size: 0.68em;
      color: var(--muted);
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 10px;
      min-width: 30px;
      text-align: right;
    }
    .fc-char-count.warning { color: #f23f42; }

    /* ── Reply quote (rendered inside a bubble) ── */
    .fc-reply-quote {
      font-size: 0.78em;
      padding: 5px 9px;
      border-radius: 9px;
      margin-bottom: 4px;
      background: rgba(0,0,0,0.18);
      border-left: 3px solid var(--accent-lt);
      max-width: 100%;
      overflow: hidden;
    }
    .fc-row.me .fc-reply-quote { border-left-color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.12); }
    .fc-reply-quote-name { display: block; font-weight: 700; color: var(--accent-lt); }
    .fc-row.me .fc-reply-quote-name { color: rgba(255,255,255,0.85); }
    .fc-reply-quote-text {
      display: block; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fc-row.me .fc-reply-quote-text { color: rgba(255,255,255,0.7); }

    /* ── Reply / react action buttons — inline in the meta row ── */
    .fc-msg-actions { display: none; } /* removed — buttons now live inside .fc-meta */
    .fc-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      width: 22px; height: 22px;
      border-radius: 50%;
      font-size: 0.8em;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, transform 0.1s;
      flex-shrink: 0;
      padding: 0;
      line-height: 1;
    }
    .fc-bubble-wrap:hover .fc-action-btn { opacity: 0.7; }
    .fc-action-btn:hover { opacity: 1 !important; background: rgba(255,255,255,0.12); transform: scale(1.15); }

    /* ── Reaction pills ── */
    .fc-reaction-area { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
    .fc-row.me .fc-reaction-area { justify-content: flex-end; }
    .fc-reaction-pill {
      font-size: 0.78em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1px 7px;
      display: inline-flex;
    }
    .fc-reaction-mine {
      border-color: var(--accent-lt);
      background: rgba(88,101,242,0.12);
    }
    @keyframes fcReactionPop { 0% { transform: scale(0.4); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
    .fc-reaction-pop { animation: fcReactionPop 0.25s ease; }

    /* ── Reaction emoji picker popup ── */
    .fc-reaction-picker {
      position: fixed;
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 8px;
      z-index: 500;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.12s, transform 0.12s;
    }
    .fc-reaction-emoji-btn {
      background: none; border: none; font-size: 1.2em; cursor: pointer; padding: 2px 4px;
      transition: transform 0.1s;
    }
    .fc-reaction-emoji-btn:hover { transform: scale(1.25); }

    /* ── Seen / read receipt ── */
    .fc-seen { font-size: 0.62em; color: var(--muted); margin-top: 1px; align-self: flex-end; }
    .fc-row.me .fc-seen.is-seen { color: var(--accent-lt); }

    /* ── Random question card ── */
    .fc-question-card {
      align-self: center;
      max-width: 82%;
      margin: 6px auto;
      background: rgba(88,101,242,0.1);
      border: 1px solid rgba(88,101,242,0.3);
      border-radius: 14px;
      padding: 10px 14px;
      text-align: center;
    }
    .fc-question-card-label { font-size: 0.72em; color: var(--accent-lt); font-weight: 700; margin-bottom: 4px; }
    .fc-question-card-text { font-size: 0.92em; color: var(--text); }
    .fc-question-card-ts { font-size: 0.62em; color: var(--muted); margin-top: 5px; }

    /* ── Notification badge in title ── */
    @media (max-width: 480px) {
      .fc-expiry-badge { display: none; }
      .fc-bubble-wrap { max-width: 82%; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="fc-header">
    <a href="/dashboard.html" class="fc-back" id="fcBack" title="დაბრუნება">←</a>
    <div class="fc-avatar" id="fcAvatar">?</div>
    <div class="fc-info">
      <div class="fc-name" id="fcName">...</div>
      <div class="fc-sub" id="fcSub">პირადი ჩატი</div>
    </div>
    <div class="fc-expiry-badge">🕐 12 სთ ჩაშლა</div>
  </header>

  <!-- AUTH REQUIRED -->
  <div id="fc-auth-screen">
    <div style="font-size:2em">🔒</div>
    <div>გთხოვთ შეხვიდეთ სისტემაში</div>
    <a href="/">მთავარ გვერდზე</a>
  </div>

  <!-- LOADING -->
  <div id="fc-loading">
    <div class="fc-spinner"></div>
    <span>იტვირთება...</span>
  </div>

  <!-- MESSAGES -->
  <div id="fc-messages" style="display:none"></div>

  <!-- EMPTY STATE (shown when no messages) -->
  <div id="fc-empty">
    <div class="fc-empty-icon">💬</div>
    <div>დაიწყეთ საუბარი</div>
    <small style="color:var(--muted);font-size:0.8em">შეტყობინებები ავტომატურად წაიშლება 12 საათში</small>
  </div>

  <!-- TYPING -->
  <div id="fc-typing">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
    <span id="fc-typing-name"></span>
    <span>წერს...</span>
  </div>

  <!-- GAME INVITE BAR -->
  <div id="fc-game-invite-bar">
    <span id="fc-game-invite-text">🎮 თამაშის მოთხოვნა</span>
    <div class="fc-invite-btns">
      <button class="fc-invite-btn accept" id="fc-game-accept">✓ დიახ</button>
      <button class="fc-invite-btn decline" id="fc-game-decline">✕ არა</button>
    </div>
  </div>

  <!-- REPLY PREVIEW -->
  <div id="fc-reply-preview">
    <div class="fc-reply-preview-inner">
      <span class="fc-reply-preview-label">↩</span>
      <div class="fc-reply-preview-body">
        <span id="fc-reply-preview-name"></span>
        <span id="fc-reply-preview-text"></span>
      </div>
    </div>
    <button id="fc-reply-preview-close" title="გაუქმება">✕</button>
  </div>

  <!-- INPUT BAR -->
  <div id="fc-input-bar" style="display:none">
    <button class="fc-extra-btn" id="fc-photo-btn" title="ფოტო">📷</button>
    <input type="file" id="fc-photo-input" accept="image/*">
    <button class="fc-extra-btn" id="fc-gif-btn" title="GIF">GIF</button>
    <button class="fc-extra-btn" id="fc-question-btn" title="შემთხვევითი კითხვა">?</button>
    <textarea id="fc-input" placeholder="შეტყობინება..." rows="1" maxlength="2000"></textarea>
    <span id="fc-char-count" class="fc-char-count"></span>
    <button id="fc-send" title="გაგზავნა">➤</button>
  </div>

  <!-- GIF PICKER -->
  <div id="fc-gif-picker">
    <input id="fc-gif-search" placeholder="GIF-ის ძებნა..." type="text" autocomplete="off">
    <div id="fc-gif-results"></div>
  </div>

  <!-- GAME OVERLAY -->
  <div id="fc-game-overlay">
    <div class="fc-game-window">
      <div class="fc-game-header">
        <span class="fc-game-title" id="fc-game-title">🎮 მინი თამაშები</span>
        <button class="fc-game-close-btn" id="fc-game-close">✕</button>
      </div>
      <div id="fc-game-content">
        <!-- menu shown initially -->
        <div class="fc-game-menu-list" id="fc-game-menu">
          <button class="fc-game-menu-item" data-game="ttt">
            <span class="fc-game-menu-icon">❌⭕</span>
            <div class="fc-game-menu-info"><strong>Tic Tac Toe</strong><small>3×3 ბადე · 3 ზედიზედ</small></div>
          </button>
          <button class="fc-game-menu-item" data-game="rps">
            <span class="fc-game-menu-icon">✊✌️</span>
            <div class="fc-game-menu-info"><strong>Rock Paper Scissors</strong><small>ერთდროული არჩევანი</small></div>
          </button>
          <button class="fc-game-menu-item" data-game="math">
            <span class="fc-game-menu-icon">🔢</span>
            <div class="fc-game-menu-info"><strong>Math Duel</strong><small>პირველი სწორი პასუხი იგებს</small></div>
          </button>
        </div>
        <div id="fc-game-board" style="display:none"></div>
      </div>
      <div id="fc-game-result">
        <div class="fc-game-result-emoji" id="fc-game-result-emoji"></div>
        <div class="fc-game-result-text" id="fc-game-result-text"></div>
        <div class="fc-game-result-btns">
          <button class="fc-game-result-btn primary" id="fc-game-rematch">🔄 ხელახლა</button>
          <button class="fc-game-result-btn secondary" id="fc-game-exit">დახურვა</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="fc-toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function () {
  "use strict";

  /* ── Helpers ─────────────────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
  }
  function $(id) { return document.getElementById(id); }

  function showToast(msg, ms = 3000) {
    const t = $("fc-toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), ms);
  }

  /* ── Auth from localStorage ──────────────────────────────────── */
  function loadAuth() {
    try {
      return {
        token:    localStorage.getItem("gaicani_auth_token"),
        username: localStorage.getItem("gaicani_auth_user")
      };
    } catch (_) { return {}; }
  }

  /* ── Parse ?friend= from URL ─────────────────────────────────── */
  function getFriendParam() {
    const u = new URLSearchParams(window.location.search);
    return (u.get("friend") || "").trim();
  }

  /* ── Format timestamp ────────────────────────────────────────── */
  function fmtTime(ts) {
    const d = ts ? new Date(ts) : new Date();
    const h = d.getHours(), m = d.getMinutes();
    const ap = h >= 12 ? "PM" : "AM";
    return `${h % 12 || 12}:${String(m).padStart(2, "0")} ${ap}`;
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString("ka-GE", { month: "long", day: "numeric" });
  }

  /* ── Expiry hint ─────────────────────────────────────────────── */
  function expiryHint(ts) {
    const hoursLeft = Math.ceil((new Date(ts) - Date.now()) / 3600000);
    if (hoursLeft <= 1) return "• <1 სთ";
    if (hoursLeft <= 3) return `• ${hoursLeft} სთ`;
    return "";
  }

  /* ── Main ────────────────────────────────────────────────────── */
  const { token, username } = loadAuth();
  const friendName = getFriendParam();

  const elLoading   = $("fc-loading");
  const elMessages  = $("fc-messages");
  const elEmpty     = $("fc-empty");
  const elInputBar  = $("fc-input-bar");
  const elTyping    = $("fc-typing");
  const elInput     = $("fc-input");
  const elSend      = $("fc-send");
  const elAuth      = $("fc-auth-screen");

  /* If not logged in or no friend param → auth screen */
  if (!token || !username) {
    elLoading.classList.add("hidden");
    elAuth.classList.add("visible");
    // Update title
    document.title = "GAICANI – შესვლა საჭიროა";
    return;
  }

  if (!friendName) {
    window.location.href = "/dashboard.html";
    return;
  }

  /* Setup header */
  $("fcAvatar").textContent = friendName.charAt(0).toUpperCase();
  $("fcName").textContent   = friendName;
  document.title = `${friendName} – GAICANI`;

  // Load the friend's real profile picture (falls back to the letter above on failure)
  fetch("/api/users/avatars", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ usernames: [friendName] }),
  })
    .then(r => r.json())
    .then(d => {
      const file = d?.avatars?.[friendName.toLowerCase()];
      if (file) $("fcAvatar").innerHTML = `<img src="/${file}" alt="avatar" />`;
    })
    .catch(() => {});

  /* ── Message state ───────────────────────────────────────────── */
  let messages   = [];   // { id, from, text, ts, replyTo, reactions }
  let myUsername = username;
  let typingTimer = null;
  let isTyping    = false;
  let socket      = null;
  let unreadCount = 0;
  const originalTitle = document.title;

  /* ── Reply state ─────────────────────────────────────────────── */
  let fcReplyTo  = null; // { text, senderName, messageId }
  let fcMsgSeq   = 0;
  function fcGenId() { return `fc_${myUsername}_${Date.now()}_${++fcMsgSeq}`; }

  const REACTION_EMOJIS = ["❤️","😂","😢"];
  let activeReactionPicker = null;

  /* ── Unread tab badge ────────────────────────────────────────── */
  function incUnread() {
    if (document.hidden) {
      unreadCount++;
      document.title = `(${unreadCount}) ${originalTitle}`;
    }
  }
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      unreadCount = 0;
      document.title = originalTitle;
    }
  });

  /* ── Build a question card element ───────────────────────────── */
  function buildQuestionCard(msg) {
    const isMe = !msg.from || msg.from.toLowerCase() !== friendName.toLowerCase();
    const card = document.createElement("div");
    card.className = "fc-question-card";
    if (msg.id) card.dataset.msgid = msg.id;

    const label = document.createElement("div");
    label.className = "fc-question-card-label";
    label.textContent = isMe ? "❓ შენ გამოგზავნე კითხვა" : `❓ ${friendName} გიგზავნის კითხვას`;

    const text = document.createElement("div");
    text.className = "fc-question-card-text";
    text.textContent = msg.text;

    const ts = document.createElement("div");
    ts.className = "fc-question-card-ts";
    ts.textContent = fmtTime(msg.ts);

    card.appendChild(label);
    card.appendChild(text);
    card.appendChild(ts);
    return card;
  }

  /* ── Build a single chat row (text / photo / gif) ─────────────── */
  function buildRow(msg, consec) {
    // Anchor on friendName (URL param) — more reliable than comparing against
    // myUsername which may have case mismatches with server's stored lowercase.
    const isMe = !msg.from || msg.from.toLowerCase() !== friendName.toLowerCase();
    const isMedia = msg.type === "photo" || msg.type === "gif";

    const row = document.createElement("div");
    row.className = "fc-row" + (isMe ? " me" : "") + (consec ? " consec" : "");
    row.dataset.from = msg.from;
    if (msg.id) row.dataset.msgid = msg.id;

    /* Avatar (or invisible spacer to keep alignment for consecutive messages) */
    let avatarEl;
    if (!consec) {
      avatarEl = document.createElement("div");
      avatarEl.className = "fc-row-avatar";
      avatarEl.textContent = msg.from.charAt(0).toUpperCase();
    } else {
      avatarEl = document.createElement("div");
      avatarEl.className = "fc-row-spacer";
    }

    /* Bubble + its wrapper (meta, reactions, seen) */
    const wrap = document.createElement("div");
    wrap.className = "fc-bubble-wrap";

    const bubble = document.createElement("div");
    bubble.className = "fc-bubble";

    /* Reply quote (text messages only) */
    if (!isMedia && msg.replyTo && msg.replyTo.text) {
      const quote = document.createElement("div");
      quote.className = "fc-reply-quote";
      if (msg.replyTo.senderName) {
        const qn = document.createElement("span");
        qn.className = "fc-reply-quote-name";
        qn.textContent = msg.replyTo.senderName;
        quote.appendChild(qn);
      }
      const qt = document.createElement("span");
      qt.className = "fc-reply-quote-text";
      const raw = msg.replyTo.text;
      qt.textContent = raw.length > 80 ? raw.slice(0, 80) + "…" : raw;
      quote.appendChild(qt);
      bubble.appendChild(quote);
    }

    if (msg.type === "photo") {
      const img = document.createElement("img");
      img.src = msg.dataUrl;
      img.className = "fc-photo-img";
      const _url = msg.dataUrl;
      img.onclick = () => showFCFullscreen(_url);
      bubble.appendChild(img);
    } else if (msg.type === "gif") {
      const img = document.createElement("img");
      img.src = msg.url;
      img.className = "fc-gif-img";
      bubble.appendChild(img);
    } else {
      const textSpan = document.createElement("span");
      textSpan.textContent = msg.text; // auto-escapes
      bubble.appendChild(textSpan);
    }

    wrap.appendChild(bubble);

    const meta = document.createElement("div");
    meta.className = "fc-meta";
    meta.textContent = fmtTime(msg.ts);
    if (msg.expiresAt) {
      const hint = expiryHint(msg.expiresAt);
      if (hint) {
        const sp = document.createElement("span");
        sp.className = "fc-expiry-hint";
        sp.textContent = hint;
        meta.appendChild(sp);
      }
    }

    wrap.appendChild(meta);

    if (!isMedia) {
      const reactionArea = document.createElement("div");
      reactionArea.className = "fc-reaction-area";
      wrap.appendChild(reactionArea);
      if (msg.reactions) {
        Object.entries(msg.reactions).forEach(([who, emoji]) => {
          displayFCReaction(msg.id, emoji, who.toLowerCase() !== myUsername.toLowerCase(), reactionArea);
        });
      }
    }

    /* (seen indicator removed) */

    /* Explicit left-to-right DOM order — no flex-direction tricks.
       Friend (left-aligned): avatar, bubble
       Me     (right-aligned): bubble, avatar               */
    if (isMe) {
      row.appendChild(wrap);
      row.appendChild(avatarEl);
    } else {
      row.appendChild(avatarEl);
      row.appendChild(wrap);
    }

    return row;
  }

  /* ── Render all messages (initial load) ───────────────────────── */
  function renderMessages() {
    elMessages.innerHTML = "";
    if (!messages.length) {
      elEmpty.classList.add("visible");
      return;
    }
    elEmpty.classList.remove("visible");

    let lastDate = null;
    let lastFrom = null;

    messages.forEach((msg) => {
      const msgDate = fmtDate(msg.ts);

      if (msgDate !== lastDate) {
        lastDate = msgDate;
        lastFrom = null;
        const sep = document.createElement("div");
        sep.className = "fc-date-sep";
        sep.textContent = msgDate;
        elMessages.appendChild(sep);
      }

      if (msg.type === "question") {
        lastFrom = null;
        elMessages.appendChild(buildQuestionCard(msg));
        return;
      }

      const consec = lastFrom !== null && lastFrom.toLowerCase() === msg.from.toLowerCase();
      lastFrom = msg.from;
      elMessages.appendChild(buildRow(msg, consec));
    });

    scrollToBottom();
  }

  function scrollToBottom(smooth) {
    requestAnimationFrame(() => {
      elMessages.scrollTop = elMessages.scrollHeight;
    });
  }

  /* ── Append a single message (real-time) ─────────────────────── */
  function appendMessage(msg) {
    if (!msg.id) msg.id = fcGenId();
    messages.push(msg);
    elEmpty.classList.remove("visible");

    if (msg.type === "question") {
      elMessages.appendChild(buildQuestionCard(msg));
      scrollToBottom();
      return msg.id;
    }

    const lastRow = elMessages.lastElementChild;
    const lastFrom = lastRow?.dataset?.from;
    const consec = lastFrom != null && lastFrom.toLowerCase() === msg.from?.toLowerCase();

    elMessages.appendChild(buildRow(msg, consec));
    scrollToBottom();
    return msg.id;
  }

  /* ── Reply preview bar ────────────────────────────────────────── */
  function setFCReplyTo({ text, senderName, messageId }) {
    fcReplyTo = { text, senderName, messageId };
    $("fc-reply-preview-name").textContent = senderName || "";
    $("fc-reply-preview-text").textContent = text.length > 80 ? text.slice(0, 80) + "…" : text;
    $("fc-reply-preview").classList.add("visible");
    elInput.focus();
  }
  function clearFCReplyTo() {
    fcReplyTo = null;
    $("fc-reply-preview").classList.remove("visible");
  }
  $("fc-reply-preview-close").addEventListener("click", () => clearFCReplyTo());

  /* ── Reactions ────────────────────────────────────────────────── */
  function showFCReactionPicker(anchorEl, messageId) {
    closeFCReactionPicker();
    const picker = document.createElement("div");
    picker.className = "fc-reaction-picker";
    REACTION_EMOJIS.forEach(emoji => {
      const btn = document.createElement("button");
      btn.className = "fc-reaction-emoji-btn";
      btn.textContent = emoji;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        reactToFCMessage(messageId, emoji);
        closeFCReactionPicker();
      });
      picker.appendChild(btn);
    });
    document.body.appendChild(picker);
    activeReactionPicker = picker;
    requestAnimationFrame(() => {
      const rect = anchorEl.getBoundingClientRect();
      const pw = picker.offsetWidth, ph = picker.offsetHeight;
      let left = rect.left, top = rect.top - ph - 8;
      if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
      if (top < 4) top = rect.bottom + 8;
      picker.style.cssText += `left:${left}px;top:${top}px;opacity:1;transform:scale(1)`;
    });
  }
  function closeFCReactionPicker() {
    activeReactionPicker?.remove();
    activeReactionPicker = null;
  }
  document.addEventListener("click", () => closeFCReactionPicker());

  function reactToFCMessage(messageId, emoji) {
    if (!socket?.connected) return;
    socket.emit("friendChat:react", { toUsername: friendName, messageId, emoji });
    const m = messages.find(mm => mm.id === messageId);
    if (m) { m.reactions = m.reactions || {}; m.reactions[myUsername.toLowerCase()] = emoji; }
    const row = elMessages.querySelector(`[data-msgid="${messageId}"]`);
    const area = row?.querySelector(".fc-reaction-area");
    if (area) displayFCReaction(messageId, emoji, true, area);
  }

  function displayFCReaction(messageId, emoji, isMine, area) {
    if (!area) {
      const row = elMessages.querySelector(`[data-msgid="${messageId}"]`);
      area = row?.querySelector(".fc-reaction-area");
    }
    if (!area) return;
    const cls = isMine ? "fc-reaction-mine" : "fc-reaction-theirs";
    let pill = area.querySelector(`.${cls}`);
    if (pill) {
      pill.classList.remove("fc-reaction-pop");
      void pill.offsetWidth;
      pill.textContent = emoji;
      pill.classList.add("fc-reaction-pop");
    } else {
      pill = document.createElement("span");
      pill.className = `fc-reaction-pill ${cls} fc-reaction-pop`;
      pill.textContent = emoji;
      area.appendChild(pill);
    }
  }

  /* ── Seen / read receipts ────────────────────────────────────── */
  function markFCSeen(messageId) {
    if (!socket?.connected || !messageId) return;
    socket.emit("friendChat:seen", { toUsername: friendName, messageId });
  }
  function showFCSeen(messageId) {
    const m = messages.find(mm => mm.id === messageId);
    if (m) m.seen = true;
    const row = elMessages.querySelector(`[data-msgid="${messageId}"]`);
    const seenEl = row?.querySelector(".fc-seen");
    if (seenEl) { seenEl.textContent = "✓✓"; seenEl.classList.add("is-seen"); }
  }

  /* ── Typing indicator ────────────────────────────────────────── */
  function showTyping() {
    $("fc-typing-name").textContent = friendName;
    elTyping.classList.add("visible");
    scrollToBottom();
  }
  function hideTyping() {
    elTyping.classList.remove("visible");
  }

  /* ── Send message ────────────────────────────────────────────── */
  function sendMessage() {
    const text = elInput.value.trim();
    if (!text || !socket?.connected) return;
    elInput.value = "";
    elInput.style.height = "auto";
    isTyping = false;

    const msgId = fcGenId();
    const currentReply = fcReplyTo ? { ...fcReplyTo } : null;

    socket.emit("privateMsg:send", {
      toUsername: friendName,
      message: text,
      messageId: msgId,
      replyTo: currentReply
    });

    /* Optimistic local append */
    appendMessage({ id: msgId, from: myUsername, text, ts: new Date().toISOString(), replyTo: currentReply });

    clearFCReplyTo();
    updateFCCharCount();
    elInput.focus();
  }

  /* ── Load history ────────────────────────────────────────────── */
  async function loadHistory() {
    try {
      const r = await fetch(
        `/api/priv/history?username=${encodeURIComponent(myUsername)}&friend=${encodeURIComponent(friendName)}`,
        { headers: { "Authorization": `Bearer ${token}` } }
      );
      if (!r.ok) throw new Error("not ok");
      const d = await r.json();
      messages = (d.messages || []).map(m => ({
        id:        m.messageId || fcGenId(),
        from:      m.from,
        text:      m.text,
        ts:        m.ts,
        replyTo:   m.replyTo || null,
        reactions: m.reactions || null,
        expiresAt: m.expiresAt || null
      }));
    } catch (_) {
      messages = [];
    }
  }

  /* ── Verify auth & friendship, then connect ──────────────────── */
  async function init() {
    /* 1. Verify token */
    let verifiedUser = null;
    try {
      const r = await fetch("/api/auth/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token })
      });
      const d = await r.json();
      if (!d.success && !d.ok) throw new Error("auth fail");
      verifiedUser = d;

      /* 2. Check friendship */
      const friends = (d.friends || []).map(f => f.toLowerCase());
      if (!friends.includes(friendName.toLowerCase())) {
        /* Not friends — redirect home */
        showToast("⚠️ ეს მომხმარებელი შენი მეგობარი არ არის");
        setTimeout(() => { window.location.href = "/dashboard.html"; }, 1500);
        return;
      }
    } catch (_) {
      elLoading.classList.add("hidden");
      elAuth.classList.add("visible");
      return;
    }

    /* 3. Load chat history */
    await loadHistory();

    /* 4. Show UI */
    elLoading.classList.add("hidden");
    elMessages.style.display = "flex";
    elMessages.style.flexDirection = "column";
    elInputBar.style.display = "flex";
    renderMessages();

    /* 5. Connect socket */
    socket = io({
      transports: ["websocket", "polling"],
    });

    setupMediaGameSocketListeners();

    socket.on("connect", () => {
      socket.emit("auth:login", { token });
    });

    /* Authenticated → join friend-chat room */
    socket.on("auth:authenticated", () => {
      socket.emit("friendChat:join", { friendUsername: friendName });
    });

    /* Incoming message for THIS friend conversation */
    socket.on("privateMsg:received", ({ fromUsername, message, timestamp, type, dataUrl, url, messageId, replyTo }) => {
      /* Only process messages from our specific friend */
      if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
      hideTyping();
      if (type === "photo") {
        appendMessage({ from: fromUsername, type: "photo", dataUrl, ts: timestamp });
      } else if (type === "gif") {
        appendMessage({ from: fromUsername, type: "gif", url, ts: timestamp });
      } else {
        const newId = appendMessage({ id: messageId, from: fromUsername, text: message, ts: timestamp, replyTo: replyTo || null });
        if (!document.hidden) markFCSeen(newId);
      }
      incUnread();
    });

    /* Message sent confirmation (no-op, we already optimistically appended) */
    socket.on("privateMsg:sent", () => {});

    /* Friend reacted to one of our messages */
    socket.on("friendChat:reacted", ({ fromUsername, messageId, emoji }) => {
      if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
      const m = messages.find(mm => mm.id === messageId);
      if (m) { m.reactions = m.reactions || {}; m.reactions[fromUsername.toLowerCase()] = emoji; }
      displayFCReaction(messageId, emoji, false);
    });

    /* Friend has seen one of our messages */
    socket.on("friendChat:partnerSeen", ({ messageId }) => {
      showFCSeen(messageId);
    });

    /* Friend sent a random question card */
    socket.on("friendChat:question", ({ fromUsername, text }) => {
      if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
      hideTyping();
      appendMessage({ from: fromUsername, type: "question", text, ts: new Date().toISOString() });
      incUnread();
    });

    /* Typing indicator from friend */
    socket.on("friendChat:partnerTyping", ({ fromUsername }) => {
      if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
      showTyping();
      clearTimeout(typingTimer);
      typingTimer = setTimeout(hideTyping, 3000);
    });

    socket.on("auth:error", () => {
      elMessages.style.display = "none";
      elInputBar.style.display = "none";
      elLoading.classList.add("hidden");
      elAuth.classList.add("visible");
    });
  }

  /* Mark anything currently rendered as seen when the tab gains focus */
  document.addEventListener("visibilitychange", () => {
    if (document.hidden || !messages.length) return;
    const last = messages[messages.length - 1];
    if (last && !last.type && last.from.toLowerCase() !== myUsername.toLowerCase()) {
      markFCSeen(last.id);
    }
  });

  /* ── Random question button ───────────────────────────────────── */
  let fcQuestionCooldown = false;

  if (elQuestionBtn) {

  /* ── Photo send ──────────────────────────────────────────────── */
  const elPhotoBtn   = $("fc-photo-btn");

  if (elPhotoBtn) {
    elPhotoBtn.addEventListener("click", () => {
      if (elPhotoInput) elPhotoInput.click();
    });
  }

  function compressFCImage(file, cb) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  if (elPhotoInput) {
    elPhotoInput.addEventListener("change", () => {
      const file = elPhotoInput.files[0];
      elPhotoInput.value = "";
      if (!file || !socket?.connected) return;
      if (!file.type.startsWith("image/")) { showToast("⚠️ მხოლოდ სურათები"); return; }
      compressFCImage(file, (dataUrl) => {
        socket.emit("friendChat:photo", { toUsername: friendName, dataUrl });
        appendMessage({ from: myUsername, type: "photo", dataUrl, ts: new Date().toISOString() });
      });
    });
  }

  /* ── Game element refs at outer scope so renderFCGame / showFCGameResult can see them ── */
  const elGameBtn      = $("fc-game-btn");

  const elGameResult   = $("fc-game-result");

  const elGameInvText  = $("fc-game-invite-text");

  function setupMediaGameSocketListeners() {
  socket.on("friendChat:photo", ({ fromUsername, dataUrl, timestamp }) => {
    if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
    hideTyping();
    appendMessage({ from: fromUsername, type: "photo", dataUrl, ts: timestamp || new Date().toISOString() });

  /* ── GIF Picker ──────────────────────────────────────────────── */
  const elGifBtn     = $("fc-gif-btn");
  const elGifPicker  = $("fc-gif-picker");
  const elGifSearch  = $("fc-gif-search");
  const elGifResults = $("fc-gif-results");
  const TENOR_PROXY  = "/api/gifs";
  let gifPickerOpen  = false;
  let gifTimer       = null;
  let gifCtrl        = null;

  function openGifPicker() {
    elGifPicker.classList.add("open");
    gifPickerOpen = true;
    elGifSearch.value = "";
    elGifSearch.focus();
    fetchGifs("");
  }
  function closeGifPicker() {
    elGifPicker.classList.remove("open");
    gifPickerOpen = false;
  }

  async function fetchGifs(q) {
    if (gifCtrl) gifCtrl.abort();
    gifCtrl = new AbortController();
    elGifResults.innerHTML = '<div style="color:var(--muted);font-size:0.85em;padding:8px;">Loading...</div>';
    try {
      const url = q ? `${TENOR_PROXY}?q=${encodeURIComponent(q)}&limit=20` : `${TENOR_PROXY}?limit=20`;
      const res = await fetch(url, { signal: gifCtrl.signal });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const items = data.results || [];
      if (!items.length) { elGifResults.innerHTML = '<div style="color:var(--muted);font-size:0.85em;padding:8px;">No GIFs found</div>'; return; }
      elGifResults.innerHTML = "";
      items.forEach(item => {
        const preview = item.media_formats?.tinygif?.url || item.media?.[0]?.tinygif?.url || item.media?.[0]?.gif?.url;
        const full    = item.media_formats?.gif?.url    || item.media?.[0]?.gif?.url || preview;
        if (!preview) return;
        const img = document.createElement("img");
        img.src = preview;
        img.className = "fc-gif-item";
        img.loading = "lazy";
        img.addEventListener("click", () => sendFCGif(full || preview, preview));
        elGifResults.appendChild(img);
      });
    } catch (e) {
      if (e.name !== "AbortError")
        elGifResults.innerHTML = '<div style="color:var(--muted);font-size:0.85em;padding:8px;">Failed to load GIFs</div>';
    }
  }

  function sendFCGif(fullUrl, previewUrl) {
    if (!socket?.connected) return;
    socket.emit("friendChat:gif", { toUsername: friendName, url: fullUrl });
    appendMessage({ from: myUsername, type: "gif", url: fullUrl, ts: new Date().toISOString() });
    closeGifPicker();
  }

  if (elGifBtn) {
    elGifBtn.addEventListener("click", () => {
      gifPickerOpen ? closeGifPicker() : openGifPicker();
    });
  }

  elGifSearch.addEventListener("input", () => {
    clearTimeout(gifTimer);
    gifTimer = setTimeout(() => fetchGifs(elGifSearch.value.trim()), 450);
  });

  document.addEventListener("click", (e) => {
    if (gifPickerOpen && !elGifPicker.contains(e.target) && e.target !== elGifBtn) {
      closeGifPicker();
    }
  });

  socket.on("friendChat:gif", ({ fromUsername, url, timestamp }) => {
    if (fromUsername.toLowerCase() !== friendName.toLowerCase()) return;
    hideTyping();
    appendMessage({ from: fromUsername, type: "gif", url, ts: timestamp || new Date().toISOString() });
    incUnread();
  });

  /* ── Mini Games ──────────────────────────────────────────────── */
  const GAME_NAMES = { ttt: "❌⭕ Tic Tac Toe", rps: "✊✌️ Rock Paper Scissors", math: "🔢 Math Duel" };
  const RPS_EMOJI  = { rock: "✊", paper: "✋", scissors: "✌️" };
  const RPS_LABELS = { rock: "ჭა", paper: "ქაღალდი", scissors: "მაკრატელი" };

  let fcGame = null; // current game state
  let pendingGameInvite = null; // { gameType, fromId }

  function openGameMenu() {
    elGameMenu.style.display = "";
    elGameBoard.style.display = "none";
    elGameResult.style.display = "none";
    elGameTitle.textContent = "🎮 მინი თამაშები";
    elGameOverlay.classList.add("open");
  }
  function closeGameOverlay() {
    elGameOverlay.classList.remove("open");
    fcGame = null;
    elGameMenu.style.display = "";
    elGameBoard.style.display = "none";
    elGameResult.style.display = "none";
  }

  if (elGameBtn)   elGameBtn.addEventListener("click", openGameMenu);
  if (elGameClose) elGameClose.addEventListener("click", closeGameOverlay);

  $("fc-game-exit").addEventListener("click", closeGameOverlay);
  $("fc-game-rematch").addEventListener("click", () => {
    if (!fcGame) return;
    const gt = fcGame.type;
    closeGameOverlay();
    socket.emit("game:request", { gameType: gt });
    showToast(`⏳ ${GAME_NAMES[gt]} მოთხოვნა გაიგზავნა...`);
  });

  // Game menu item clicks
  elGameMenu.querySelectorAll(".fc-game-menu-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const gt = btn.dataset.game;
      closeGameOverlay();
      socket.emit("game:request", { gameType: gt });
      showToast(`⏳ ${GAME_NAMES[gt]} მოთხოვნა გაიგზავნა...`);
    });
  });

  // Incoming game invite
  socket.on("game:invite", ({ gameType, fromId, isRematch }) => {
    pendingGameInvite = { gameType, fromId };
    elGameInvText.textContent = `${isRematch ? "🔄" : "🎮"} ${GAME_NAMES[gameType] || gameType} — დათანხმება?`;
    elGameInvBar.classList.add("visible");
  });

  elGameAccept.addEventListener("click", () => {
    if (!pendingGameInvite) return;
    socket.emit("game:response", { accepted: true, gameType: pendingGameInvite.gameType, toId: pendingGameInvite.fromId });
    elGameInvBar.classList.remove("visible");
    pendingGameInvite = null;
  });
  elGameDecline.addEventListener("click", () => {
    if (!pendingGameInvite) return;
    socket.emit("game:response", { accepted: false, gameType: pendingGameInvite.gameType, toId: pendingGameInvite.fromId });
    elGameInvBar.classList.remove("visible");
    pendingGameInvite = null;
  });

  socket.on("game:declined", () => {
    showToast("❌ მოწინააღმდეგემ უარი თქვა");
    pendingGameInvite = null;
    elGameInvBar.classList.remove("visible");
  });

  socket.on("game:start", ({ gameId, gameType, role, opponentId, state }) => {
    elGameInvBar.classList.remove("visible");
    pendingGameInvite = null;
    fcGame = { gameId, type: gameType, role, opponentId, state };
    elGameTitle.textContent = GAME_NAMES[gameType] || gameType;
    elGameMenu.style.display = "none";
    elGameBoard.style.display = "";
    elGameResult.style.display = "none";
    elGameOverlay.classList.add("open");
    renderFCGame(gameType, state, role);
  });

  socket.on("game:update", (data) => {
    if (!fcGame) return;

    // Wrong answer in math duel
    if (data.wrong) {
      showToast("❌ არასწორი პასუხი!");
      return;
    }
    // Opponent chose in RPS (don't reveal what)
    if (data.opponentChose) {
      showToast("✅ მოწინააღმდეგემ აირჩია, ელოდება...");
      return;
    }

    // Game over — server sends winnerSocketId (or null for draw)
    if (data.winnerSocketId !== undefined || data.draw) {
      let result;
      if (data.draw) result = "draw";
      else if (data.winnerSocketId === socket.id) result = "win";
      else result = "lose";

      // Update state so board/choices show final state before result screen
      if (fcGame.type === "ttt" && data.board) {
        fcGame.state = { ...fcGame.state, board: data.board, winLine: data.winLine };
        renderFCGame(fcGame.type, fcGame.state, fcGame.role, data);
      } else if (fcGame.type === "rps" && data.choices) {
        fcGame.state = { ...fcGame.state, choices: data.choices };
        renderFCGame(fcGame.type, fcGame.state, fcGame.role, data);
      }
      setTimeout(() => showFCGameResult(result, fcGame?.role), fcGame.type === "ttt" ? 700 : 200);
      return;
    }

    // Mid-game TTT board update
    if (fcGame.type === "ttt" && data.board) {
      fcGame.state = {
        ...fcGame.state,
        board: data.board,
        currentTurnSocketId: data.currentTurnSocketId,
      };
      renderFCGame(fcGame.type, fcGame.state, fcGame.role, data);
    }
  });

  socket.on("game:partnerLeft", () => {
    showToast("😢 მოწინააღმდეგე გავიდა");
    closeGameOverlay();
  });
  } // end setupMediaGameSocketListeners

  function renderFCGame(type, state, role, update) {
    elGameBoard.innerHTML = "";
    if (type === "ttt") renderTTT(state, role, update);
    else if (type === "rps") renderRPS(state, role, update);
    else if (type === "math") renderMath(state, update);
  }

  function renderTTT(state, role, update) {
    const board = state?.board || Array(9).fill(null);
    const myTurn = state?.currentTurnSocketId === socket?.id;
    const status = document.createElement("div");
    status.className = "fc-game-status";
    status.textContent = myTurn ? "🟢 შენი ჯერია" : "⏳ ელოდება...";
    elGameBoard.appendChild(status);

    const grid = document.createElement("div");
    grid.className = "fc-ttt-board";
    board.forEach((val, i) => {
      const cell = document.createElement("button");
      cell.className = "fc-ttt-cell" + (update?.winLine?.includes(i) ? " win" : "");
      cell.textContent = val || "";
      cell.disabled = !!val || !myTurn;
      cell.addEventListener("click", () => {
        socket.emit("game:move", { index: i });
        cell.disabled = true;
      });
      grid.appendChild(cell);
    });
    elGameBoard.appendChild(grid);
  }

  function renderRPS(state, role, update) {
    const status = document.createElement("div");
    status.className = "fc-game-status";
    const myChoice = state?.choices?.[role];
    status.textContent = myChoice ? "✅ გაგზავნილია, ელოდება..." : "აირჩიეთ:";
    elGameBoard.appendChild(status);

    const row = document.createElement("div");
    row.className = "fc-rps-choices";
    ["rock", "paper", "scissors"].forEach(c => {
      const btn = document.createElement("button");
      btn.className = "fc-rps-btn";
      btn.innerHTML = `${RPS_EMOJI[c]}<br><small style="font-size:0.5em">${RPS_LABELS[c]}</small>`;
      btn.disabled = !!myChoice;
      btn.addEventListener("click", () => {
        socket.emit("game:move", { choice: c });
        renderRPS({ ...state, choices: { ...(state?.choices || {}), [role]: c } }, role);
      });
      row.appendChild(btn);
    });
    elGameBoard.appendChild(row);
  }

  function renderMath(state, update) {
    if (!state?.question) { elGameBoard.innerHTML = '<div class="fc-game-status">⏳ Loading...</div>'; return; }
    const q = document.createElement("div");
    q.className = "fc-math-q";
    q.textContent = `${state.question.display || state.question} = ?`;
    elGameBoard.appendChild(q);

    const row = document.createElement("div");
    row.className = "fc-math-input-row";
    const inp = document.createElement("input");
    inp.type = "number"; inp.className = "fc-math-input"; inp.placeholder = "პასუხი...";
    const btn = document.createElement("button");
    btn.className = "fc-math-submit"; btn.textContent = "✓";
    const submit = () => {
      const val = parseInt(inp.value, 10);
      if (isNaN(val)) return;
      socket.emit("game:move", { answer: val });
      btn.disabled = true; inp.disabled = true;
    };
    btn.addEventListener("click", submit);
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    row.appendChild(inp); row.appendChild(btn);
    elGameBoard.appendChild(row);
  }

  function showFCGameResult(result, role, winnerSymbol, winLine) {
    const EMOJIS = { win: "🏆", lose: "😢", draw: "🤝" };
    const TEXTS  = { win: "გაიმარჯვე!", lose: "წააგე", draw: "ფრე!" };
    $("fc-game-result-emoji").textContent = EMOJIS[result] || "🎮";
    $("fc-game-result-text").textContent  = TEXTS[result]  || result;
    elGameResult.style.display = "block";
    elGameBoard.style.display  = "none";
    elGameMenu.style.display   = "none";
    elGameOverlay.classList.add("open");
    if (fcGame) fcGame.state = null;
  }

  /* ── Start ───────────────────────────────────────────────────── */
  init();

})();
</script>
</body>
</html>
