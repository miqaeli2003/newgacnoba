<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GAICANI | Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="top-bar">
    <div class="left-side">
      <a href="/" class="site-name">GAICANI</a>
      <div id="onlineCount">Users Online: 0</div>
    </div>
    <div class="right-side">
      <button class="change-name-btn" id="changeNameBtn">სახელის შეცვლა</button>
      <button class="block-button" id="blockBtn" disabled>ბლოკი</button>
      <button class="next-button" id="nextBtn">ძებნა</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div id="gifPicker" class="gif-picker">
    <input type="text" id="gifSearch" placeholder="Search GIPHY..." autocomplete="off" />
    <div id="gifResults" class="gif-results"></div>
  </div>

  <div id="replyPreview" class="reply-preview-bar">
    <div class="reply-info">
      <i class="fas fa-reply"></i>
      <span id="replyText">Replying to...</span>
    </div>
    <button id="cancelReply"><i class="fas fa-times"></i></button>
  </div>

  <div class="chat-input">
    <button id="gifBtn" class="icon-btn" title="Send GIF" disabled>
        <i class="fas fa-gift"></i>
    </button>
    <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" disabled />
    <button id="sendBtn" disabled>SEND</button>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <input type="text" id="nameInput" placeholder="Enter your username..." autocomplete="off" maxlength="20" />
      <div id="nameError" class="name-error"></div>
      <button id="saveNameBtn">Start Chatting</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
