<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatting Site</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-bar">
    <div class="left-side">
      <a href="/" class="site-name">GAICANI</a>
      <div id="onlineCount">Users Online: 0</div>
    </div>
    <div class="right-side">
      <button class="change-name-btn" id="changeNameBtn">სახელის შეცვლა</button>
      <button class="block-button" id="blockBtn" disabled>ბლოკი</button>
      <button class="next-button" id="nextBtn">ძებნა</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-wrapper">
    <div id="replyIndicator" class="reply-indicator">
      <span id="replyText">Replying to...</span>
      <span id="cancelReply">&times;</span>
    </div>
    <div class="chat-input">
      <button id="gifBtn" disabled>GIF</button>
      <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" disabled />
      <button id="sendBtn" disabled>SEND</button>
    </div>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <input type="text" id="nameInput" placeholder="Enter your username..." autocomplete="off" maxlength="20" />
      <div id="nameError" class="name-error"></div>
      <button id="saveNameBtn">Start Chatting</button>
    </div>
  </div>

  <div id="gifModal" class="modal" style="display: none;">
    <div class="modal-content gif-modal-content">
      <h3 style="margin-top: 0;">Select a GIF</h3>
      <div id="gifGrid" class="gif-grid"></div>
      <button id="closeGifBtn" style="background: #e53935; margin-top: 15px;">Close</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
