<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chatting Site</title>

  <!-- PWA / mobile chrome -->
  <meta name="theme-color" content="#2b2d31" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect to Tenor CDN so GIF images load faster -->
  <link rel="preconnect" href="https://media.tenor.com" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="games.css" />
</head>
<body>
  <div class="top-bar">
    <div class="left-side">
      <a href="/" class="site-name">GAICANI</a>
      <div id="onlineCount"></div>
      <div id="userNameDisplay" class="user-name-display" style="display:none"></div>
    </div>
    <div class="right-side">
      <button class="interests-btn" id="interestsBtn" style="display:none"><span class="btn-icon btn-icon--int">ინტ.</span><span class="btn-label">ინტერესები</span></button>
      <button class="change-name-btn" id="changeNameBtn"><span class="btn-icon">✏️</span><span class="btn-label">სახელის შეცვლა</span></button>
      <button class="block-button" id="blockBtn" disabled><span class="btn-icon">🚫</span><span class="btn-label">ბლოკი</span></button>
      <button class="next-button" id="nextBtn"><span class="btn-icon">🔎</span><span class="btn-label">ძებნა</span></button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <!-- GIF Picker Panel -->
  <div id="gifPicker" class="gif-picker" style="display:none">
    <div class="gif-picker-header">
      <input type="text" id="gifSearch" placeholder="🔍 Search GIFs..."
             autocomplete="off" inputmode="search" enterkeyhint="search" />
      <button class="gif-picker-close" id="gifPickerClose">✕</button>
    </div>
    <div class="gif-results" id="gifResults">
      <div class="gif-placeholder" id="gifLoading">✨ Loading trending GIFs...</div>
    </div>
    <div class="gif-powered">Powered by Tenor</div>
  </div>

  <!-- Typing indicator -->
  <div id="typingIndicator" class="typing-indicator" style="display:none">
    <span></span><span></span><span></span>
  </div>

  <div class="chat-input">
    <div id="replyPreview" class="reply-preview-bar" style="display:none">
      <div class="reply-preview-inner">
        <span class="reply-preview-label">↩</span>
        <div class="reply-preview-body">
          <span id="replyPreviewName" class="reply-preview-name"></span>
          <span id="replyPreviewText" class="reply-preview-text"></span>
        </div>
      </div>
      <button id="replyPreviewClose" class="reply-preview-close">✕</button>
    </div>

    <div class="chat-input-row">
      <input type="text" id="messageInput" placeholder="Type your message..." disabled />
      <span id="charCount" class="char-count"></span>
      <button id="questionBtn" class="question-btn" disabled>?</button>
      <button id="gifBtn" class="gif-btn" disabled>GIF</button>
      <button id="sendBtn" disabled>SEND</button>
    </div>
  </div>

  <!-- Name Modal -->
  <div id="nameModal" class="modal">
    <div class="modal-content">
      <img src="/Logo2.png" class="modal-logo" />
      <input type="text" id="nameInput" placeholder="შეიყვანეთ სახელი..." />
      <div id="nameError" class="name-error"></div>
      <button id="saveNameBtn">საუბრის დაწყება</button>
    </div>
  </div>

  <!-- Bio Popup -->
  <div id="bioPopup" class="bio-popup" style="display:none">
    <div class="bio-popup-content">
      <button id="bioCloseBtn" class="bio-popup-close">✕</button>
      <textarea id="bioInput" maxlength="60"></textarea>
      <button id="bioSaveBtn">შენახვა</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
  <script src="games.js"></script>
</body>
</html>
