<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <title>GAICANI | Anonymous Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="brand">
        <h1>GAICANI</h1>
        <span id="onlineCount" class="badge">0 Online</span>
      </div>
      <div class="actions">
        <button id="changeNameBtn" class="icon-btn" title="სახელის შეცვლა"><i class="fas fa-user-edit"></i></button>
        <button id="blockBtn" class="icon-btn danger" disabled title="ბლოკი"><i class="fas fa-ban"></i></button>
        <button id="nextBtn" class="primary-btn">ძებნა</button>
      </div>
    </header>

    <main class="chat-container" id="chat"></main>

    <div class="bottom-area">
      <div id="replyIndicator" class="reply-bar">
        <div class="reply-content">
          <i class="fas fa-reply"></i>
          <span id="replyText">...</span>
        </div>
        <i id="cancelReply" class="fas fa-times"></i>
      </div>

      <div class="input-panel">
        <button id="gifBtn" class="tool-btn" disabled><i class="fas fa-sticky-note"></i></button>
        <div class="input-group">
          <input type="text" id="messageInput" placeholder="დაწერე შეტყობინება..." autocomplete="off" disabled />
          <button id="sendBtn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div id="nameModal" class="modal active">
    <div class="modal-card">
      <h2>მოგესალმებით</h2>
      <p>შეიყვანეთ სახელი დასაწყებად</p>
      <input type="text" id="nameInput" placeholder="თქვენი სახელი..." maxlength="15" />
      <div id="nameError" class="error-msg"></div>
      <button id="saveNameBtn" class="confirm-btn">დაწყება</button>
    </div>
  </div>

  <div id="gifModal" class="modal">
    <div class="modal-card gif-card">
      <div class="gif-header">
        <input type="text" id="gifSearchInput" placeholder="მოძებნე GIF (მაგ: Funny, Cat)..." />
      </div>
      <div id="gifGrid" class="gif-grid"></div>
      <button id="closeGifBtn" class="close-btn">დახურვა</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
