<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chatting Site</title>

  <meta name="theme-color" content="#2b2d31" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />

  <link rel="preconnect" href="https://media.tenor.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-bar">
    <div class="left-side">
      <a href="/" class="site-name">GAICANI</a>
      <div id="onlineCount"></div>
      <div id="userNameDisplay" class="user-name-display" style="display:none"></div>
    </div>
    <div class="right-side">
      <button class="change-name-btn" id="changeNameBtn">სახელის შეცვლა</button>
      <button class="block-button" id="blockBtn" disabled>ბლოკი</button>
      <button class="next-button" id="nextBtn">ძებნა</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div id="gifPicker" class="gif-picker" style="display:none">
    <div class="gif-picker-header">
      <input type="text" id="gifSearch" placeholder="🔍 Search GIFs..."
             autocomplete="off" inputmode="search" enterkeyhint="search" />
      <button class="gif-picker-close" id="gifPickerClose">✕</button>
    </div>
    <div class="gif-results" id="gifResults">
      <div class="gif-placeholder" id="gifLoading">✨ Loading trending GIFs...</div>
    </div>
    <div class="gif-powered">Powered by Tenor</div>
  </div>

  <div class="chat-input">
    <div id="replyPreview" class="reply-preview-bar" style="display:none">
      <div class="reply-preview-inner">
        <span class="reply-preview-label">↩</span>
        <div class="reply-preview-body">
          <span id="replyPreviewName" class="reply-preview-name"></span>
          <span id="replyPreviewText" class="reply-preview-text"></span>
        </div>
      </div>
      <button id="replyPreviewClose" class="reply-preview-close" title="Cancel reply">✕</button>
    </div>
    <div class="chat-input-row">
      <input type="text" id="messageInput" placeholder="Type your message..."
             autocomplete="off" autocorrect="off" autocapitalize="sentences"
             spellcheck="false" inputmode="text" enterkeyhint="send" disabled />
      <span id="charCount" class="char-count"></span>
      <button id="questionBtn" class="question-btn" disabled title="Random question">?</button>
      <button id="gifBtn" class="gif-btn" disabled title="Send a GIF">GIF</button>
      <button id="sendBtn" disabled>SEND</button>
    </div>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <img src="/Logo2.png" alt="GAICANI" class="modal-logo" />
      <input type="text" id="nameInput" placeholder="შეიყვანეთ სახელი..."
             autocomplete="off" inputmode="text" enterkeyhint="go" maxlength="20" />
      <div id="nameError" class="name-error"></div>
      <p class="safety-age-confirm">
        საუბრის დაწყებით ადასტურებთ რომ ხართ <strong>18+</strong> და ეთანხმებით
        <a href="/terms.html" target="_blank" class="safety-link">Terms of Service</a>-ს და
        <a href="/privacy.html" target="_blank" class="safety-link">Privacy Policy</a>-ს.
      </p>
      <button id="saveNameBtn">საუბრის დაწყება</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
