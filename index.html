<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatting Site</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-bar">
    <div class="left-side">
      <a href="/" class="site-name">GAICANI</a>
      <div id="onlineCount">Users Online: 0</div>
    </div>
    <div class="right-side">
      <button class="change-name-btn" id="changeNameBtn">სახელის შეცვლა</button>
      <button class="block-button" id="blockBtn" disabled>ბლოკი</button>
      <button class="next-button" id="nextBtn">ძებნა</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <!-- GIF Panel (slides up above input) -->
  <div class="gif-panel" id="gifPanel">
    <div class="gif-panel-header">
      <input type="text" id="gifSearch" placeholder="Search GIFs..." autocomplete="off" />
      <button id="gifPanelClose" title="Close">✕</button>
    </div>
    <div class="gif-grid" id="gifGrid">
      <div class="gif-loading">Press the GIF button to search 🎬</div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input">
    <div class="reply-bar" id="replyBar">
      <div class="reply-bar-content">
        <span class="reply-bar-label">↩ Replying to:</span>
        <span class="reply-bar-text" id="replyBarText"></span>
      </div>
      <button class="reply-bar-cancel" id="cancelReply" title="Cancel reply">✕</button>
    </div>
    <div class="input-row">
      <button class="gif-btn" id="gifBtn" disabled title="Send a GIF">GIF</button>
      <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" disabled />
      <button id="sendBtn" disabled>SEND</button>
    </div>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <input type="text" id="nameInput" placeholder="Enter your username..." autocomplete="off" maxlength="20" />
      <div id="nameError" class="name-error"></div>
      <button id="saveNameBtn">Start Chatting</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
